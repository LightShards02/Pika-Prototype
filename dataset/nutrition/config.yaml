version: 1

project:
  name: NUTRITION
  root_dir: .
  state:
    design_spec_path: state/DESIGN-SPEC.csv
    id_registry_path: state/id_registry.json
    sads_id_mapping_path: state/sads_id_mapping.json

agent:
  provider: local  # stub | api | local
  schema_validation_retries: 3
  stream_output: false
  # Codex model_reasoning_effort: map + anchor = medium, implementer = high (pika defaults)
  # Override per prompt: reasoning_effort: { map_spec_to_code: medium, implement_from_specs: high }
  api_key_env: NVIDIA_API_KEY
  api_url: https://integrate.api.nvidia.com/v1/chat/completions
  api_model: moonshotai/kimi-k2.5

prompts:
  prompt_file: prompts/PROMPT.yaml

schemas:
  plan_output: schemas/agent_outputs/plan_output.schema.json
  map_output: schemas/agent_outputs/index_output.schema.json
  implement_output: schemas/agent_outputs/implement_output.schema.json
  resolve_plan_map_output: schemas/agent_outputs/issue_map_output.schema.json
  resolve_plan_output: schemas/agent_outputs/issue_resolve_output.schema.json

commands:
  plan:
    enabled: false
    prompt_name: project_designer
    inputs:
      srs_path: specs/srs.md
      project_context_filename: PROJECT_CONTEXT.md
    outputs:
      root_dir: { path: out, no_overwrite: false }
      backups_dir: { path: out/backups, no_overwrite: false }
      agent_runs_dir: { path: out/agent_runs, no_overwrite: false }
      agent_artifacts_dir: { path: out/agent_artifacts, no_overwrite: false }
      logs_dir: { path: out/logs, no_overwrite: false }
  format:
    enabled: true
    deterministic: true
    copy_before_write: true
    inputs:
      design_spec_path: raw-design-spec.csv
    outputs:
      design_spec_path:
        path: out/state/design-spec.csv
        no_overwrite: false
      backups_dir: { path: out/backups, no_overwrite: false }
  review:
    enabled: false
    prompt_name: design_reviewer
    inputs:
      srs_path: specs/srs.md
      design_spec_path: out/state/DESIGN-SPEC.csv
      project_context_filename: PROJECT_CONTEXT.md
    outputs:
      root_dir: { path: out, no_overwrite: false }
      backups_dir: { path: out/backups, no_overwrite: false }
      agent_runs_dir: { path: out/agent_runs, no_overwrite: false }
      agent_artifacts_dir: { path: out/agent_artifacts, no_overwrite: false }
      logs_dir: { path: out/logs, no_overwrite: false }
  map:
    enabled: true
    prompt_name: map_spec_to_code
    skip_mapped: true
    max_acceptance_chars: 0
    inputs:
      design_spec_path: state/DESIGN-SPEC.csv
      codebase_dir: .
      project_context_filename: PROJECT_CONTEXT.md
    outputs:
      root_dir: { path: out, no_overwrite: false }
      backups_dir: { path: out/backups, no_overwrite: false }
      agent_runs_dir: { path: out/agent_runs, no_overwrite: false }
      agent_artifacts_dir: { path: out/agent_artifacts, no_overwrite: false }
      logs_dir: { path: out/logs, no_overwrite: false }
      agent_view_csv: { path: out/intermediate/map/agent_view.csv, no_overwrite: false }
      intermediate_map_dir: { path: out/intermediate/map, no_overwrite: false }
  implement:
    enabled: true
    prompt_name: implement_from_specs
    inputs:
      design_spec_path: state/DESIGN-SPEC.csv
      codebase_dir: .
      project_context_filename: PROJECT_CONTEXT.md
    outputs:
      root_dir: { path: out, no_overwrite: false }
      backups_dir: { path: out/backups, no_overwrite: false }
      agent_runs_dir: { path: out/agent_runs, no_overwrite: false }
      agent_artifacts_dir: { path: out/agent_artifacts, no_overwrite: false }
      logs_dir: { path: out/logs, no_overwrite: false }
    anchor_planner_prompt_name: implement_anchor_planner
    anchor_linker_prompt_name: implement_anchor_linker
    type_placement_path: workspace/shared-contracts/
    allowed_module_roles: [frontend, api, domain, infra, shared, cli, worker]
    disallowed_link_kinds_by_required_role:
      frontend:
        - service_interface
        - event_topic
        - db_table
        - file_format
        - external_api
        - test_suite
      domain:
        - external_api
    test_spec_path: out/state/test_spec.csv
    issue_tracker_path: out/issue_tracking.csv
    repair_max_attempts: 0
    forbidden_paths: [docs/, specs/]
    verification_commands: []
    budgets:
      max_specs_per_batch: 15
      max_files: 10
      max_lines_changed: 600
      max_context_tokens: 12000
  resolve_plan:
    enabled: true
    map_prompt_name: map_issues_to_specs
    resolve_prompt_name: resolve_issues_with_diffs
    inputs:
      design_spec_path: out/state/DESIGN-SPEC.csv
      issue_tracking_path: out/issue_tracking.csv
    outputs:
      root_dir: { path: out, no_overwrite: false }
      backups_dir: { path: out/backups, no_overwrite: false }
      agent_runs_dir: { path: out/agent_runs, no_overwrite: false }
      agent_artifacts_dir: { path: out/agent_artifacts, no_overwrite: false }
      logs_dir: { path: out/logs, no_overwrite: false }

id_generation:
  spec:
    pattern: '^[A-Za-z][0-9]+$'
  issue:
    pattern: '^[A-Za-z]{2}[0-9]+$'
  collision_scope: per_type_numeric_suffix
  registry_path: out/state/id_registry.json

csv_contracts:
  design_spec:
    add_if_missing:
      - spec_id
      - module_tag
      - subunit
      - mapped_code_symbols
      - mapped_confidence
      - mapped_consistency_score
      - mapped_problems
      - map_status
      - map_assumptions
      - mapped_at
  issue_tracking:
    add_if_missing:
      - issue_id
      - author
      - mapped_spec_ids
      - issue_notes
      - follow_up_uncertainties
      - last_resolved_at

logging:
  level: INFO
  verbose_level: DEBUG
  json: true
  log_dir: out/logs
