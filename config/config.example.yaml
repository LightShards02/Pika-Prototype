    #   providerless_contract_allowlist: []  # contract_ids intentionally exempt from providerless manual-block
    # batch_plan_construction: { enabled: true }
    # batch_plan_dependency_validation: { enabled: true }
    # batch_brief_build: { enabled: true }
    # batch_brief_scope_validation: { enabled: true }
    # dependency_context_edge_validation: { enabled: true }
    # batch_runtime_path_contract_prep: { enabled: true }
    # implement_semantic_validation:
    #   enabled: true
    #   semantic_validation_retries: 2
    # implement_output_structure_validation: { enabled: true }
    # patch_constraints_validation: { enabled: true }
    # verification_command_resolution: { enabled: true }
    # patch_normalization: { enabled: true }
    # patch_apply_gate: { enabled: true }
