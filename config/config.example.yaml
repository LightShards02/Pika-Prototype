    # test_spec_path: out/state/test_spec.csv
    # issue_tracker_path: out/issue_tracking.csv
    # forbidden_paths: [docs/, specs/]
    # verification_commands: [pytest -q]
    # semantic_validation_retries: 2      # Deprecated alias for semantic_validation step settings
    # budgets:
