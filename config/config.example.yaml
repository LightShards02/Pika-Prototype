id_generation:
  spec:
    pattern: '^[A-Za-z][0-9]+$'
  issue:
    pattern: '^[A-Za-z]{2}[0-9]+$'
  collision_scope: per_type_numeric_suffix
  registry_path: out/state/id_registry.json

csv_contracts:
  design_spec:
    add_if_missing:
      - spec_id
      - module_tag
      - subunit
      - mapped_code_symbols
      - mapped_confidence
      - mapped_consistency_score
      - mapped_problems
      - map_status
      - map_assumptions
      - mapped_at
      - map_run_id
  issue_tracking:
    add_if_missing:
      - issue_id
      - author
      - mapped_spec_ids
      - issue_notes
      - follow_up_uncertainties
      - last_resolved_at

logging:
  level: INFO
  verbose_level: DEBUG
  json: true
  log_dir: out/logs
