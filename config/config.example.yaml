# Workspace config (project-specific). Validated against config.schema.json.
# PIKA-level defaults live in config/pika.yaml (paths, codex, kimi, timeouts, etc.).
#
# Attributes that typically do NOT vary per project (have PIKA defaults):
#   - inputs.allowed_extensions (.csv, .xlsx)
#   - inputs.project_context_filename (PROJECT_CONTEXT.md)
#   - prompts.prompt_file, schemas.* (resolved from PIKA root)
#   - id_generation.pattern, collision_scope
#   - csv_contracts.add_if_missing (contract-defined columns)
#   - outputs.* path structure (out/, out/logs, etc.)
# Workspace config overrides PIKA defaults when specified.

version: 1

project:
  name: pika
  root_dir: .
  # control_vocab_path: vocab.yaml  # optional; per-project controlled vocabulary (categorized terms + definitions) injected into all LLM prompts. See dataset/nutrition/vocab.yaml for example.
  state:
    design_spec_path: out/state/DESIGN-SPEC.csv
    id_registry_path: out/state/id_registry.json
    sads_id_mapping_path: out/state/sads_id_mapping.json

agent:
  provider: stub  # stub | api | local
  schema_validation_retries: 3
  stream_output: true  # Stream output + heartbeat when agent runs (api, local).
  # When provider is local (e.g. Codex CLI):
  # local_command: codex
  # local_exec_timeout_sec: 1200  # Optional workspace override for long-running local agent calls
  # local_model: gpt-5-codex  # Or object: { default: "gpt-5-codex", implement_from_specs: "gpt-4-codex" }
  # reasoning_effort: per-prompt Codex model_reasoning_effort (low|medium|high|xhigh)
  #   Keys: prompt_name (map_spec_to_code, implement_unified_planner, implement_from_specs) or default
  #   Pika defaults: map + anchor agents = medium, implementer = high
  # reasoning_effort:
  #   default: medium
  #   implement_from_specs: high
  # When provider is api (remote HTTP chat completions):
  # api_key_env: NVIDIA_API_KEY
  # api_url: https://integrate.api.nvidia.com/v1/chat/completions
  # api_model: moonshotai/kimi-k2.5

prompts:
  prompt_file: prompts/PROMPT.yaml

schemas:
  plan_output: schemas/agent_outputs/plan_output.schema.json
  map_output: schemas/agent_outputs/index_output.schema.json
  implement_output: schemas/agent_outputs/implement_output.schema.json
  resolve_plan_map_output: schemas/agent_outputs/issue_map_output.schema.json
  resolve_plan_output: schemas/agent_outputs/issue_resolve_output.schema.json

commands:
  plan:
    enabled: false
    prompt_name: project_designer
    inputs:
      srs_path: specs/srs.md
      project_context_filename: PROJECT_CONTEXT.md
    outputs:
      root_dir: { path: out, no_overwrite: false }
      backups_dir: { path: out/backups, no_overwrite: false }
      agent_runs_dir: { path: out/agent_runs, no_overwrite: false }
      agent_artifacts_dir: { path: out/agent_artifacts, no_overwrite: false }
      logs_dir: { path: out/logs, no_overwrite: false }
  format:
    enabled: true
    deterministic: true
    copy_before_write: true
    inputs:
      design_spec_path: raw-design-spec.csv
    outputs:
      design_spec_path:
        path: out/state/DESIGN-SPEC.csv
        no_overwrite: false
      backups_dir: { path: out/backups, no_overwrite: false }
    # Optional: replace sensitive terms. keywords required; case_sensitive optional.
    sensitive_keywords:
      "[SOFTWARE]":
        keywords: [KGAS, SAGK]
      "[PARTNER]":
        keywords: [QX MGR]
        case_sensitive: true
  review:
    enabled: false
    prompt_name: design_reviewer
    inputs:
      srs_path: specs/srs.md
      design_spec_path: out/state/DESIGN-SPEC.csv
      project_context_filename: PROJECT_CONTEXT.md
    outputs:
      root_dir: { path: out, no_overwrite: false }
      backups_dir: { path: out/backups, no_overwrite: false }
      agent_runs_dir: { path: out/agent_runs, no_overwrite: false }
      agent_artifacts_dir: { path: out/agent_artifacts, no_overwrite: false }
      logs_dir: { path: out/logs, no_overwrite: false }
  map:
    enabled: true
    prompt_name: map_spec_to_code
    skip_mapped: true           # Skip map_status=mapped on re-runs
    max_acceptance_chars: 0     # Truncate acceptance_criteria at invocation (0 = unlimited)
    # max_specs_per_subunit: 50              # Split subunits larger than this into consecutive sub-batches
    # min_remapping_confidence_threshold: 0.0  # Re-map 'mapped' rows whose max confidence falls below this threshold
    # max_problem_threshold: 1.0             # Only populate problems when confidence/consistency_score < threshold
    inputs:
      design_spec_path: out/state/DESIGN-SPEC.csv
      codebase_dir: .
      project_context_filename: PROJECT_CONTEXT.md
      # extra_prompt_filename: EXTRA-PROMPT.md
    outputs:
      root_dir: { path: out, no_overwrite: false }
      backups_dir: { path: out/backups, no_overwrite: false }
      agent_runs_dir: { path: out/agent_runs, no_overwrite: false }
      agent_artifacts_dir: { path: out/agent_artifacts, no_overwrite: false }
      logs_dir: { path: out/logs, no_overwrite: false }
      agent_view_csv: { path: out/intermediate/map/agent_view.csv, no_overwrite: false }
      intermediate_map_dir: { path: out/intermediate/map, no_overwrite: false }
  implement:
    enabled: true
    implementer:
      prompt_name: implement_from_specs
    unified_planner:
      prompt_name: implement_unified_planner
    inputs:
      design_spec_path: out/state/DESIGN-SPEC.csv
      codebase_dir: .
      project_context_filename: PROJECT_CONTEXT.md
    outputs:
      root_dir: { path: out, no_overwrite: false }
      backups_dir: { path: out/backups, no_overwrite: false }
      agent_runs_dir: { path: out/agent_runs, no_overwrite: false }
      agent_artifacts_dir: { path: out/agent_artifacts, no_overwrite: false }
      logs_dir: { path: out/logs, no_overwrite: false }
    # type_placement_path: workspace/shared-contracts/
    # allowed_module_roles: [frontend, api, domain, infra, shared, cli, worker]
    # unified_planner:
    #   prompt_name: implement_unified_planner
    #   disallowed_link_kinds_by_required_role:
    #     frontend: [service_interface, event_topic, db_table, file_format, external_api, test_suite]
    #     domain: [external_api]
    #   leaf_dependency_roles: [infra]
    #   leaf_dependency_policy:
    #     mode: auto_drop
    #     track_external_dependencies: true
    #   contract_kind_definitions:
    #     api_endpoint:
    #       definition: Internal project API boundary between project modules.
    #     external_api:
    #       definition: Out-of-project third-party/system API boundary only.
    #   type_shape_match:
    #     min_auto_bind_score: 0.70
    #     tie_margin: 0.08
