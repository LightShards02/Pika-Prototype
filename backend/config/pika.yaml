# PIKA-level configuration (project-independent).
# No schema validation. Used for hardcoded defaults and tool-wide settings.
# Workspace config (config.yaml) overrides where applicable.

version: "0.1.0"

# Paths relative to PIKA root (parent of cli.py)
paths:
  config_schema: config/config.schema.json
  csv_contracts: docs/csv_contracts.md
  project_context_contracts: docs/project_context_contracts.md
  prompts_file: prompts/PROMPT.yaml
  schemas_dir: schemas/agent_outputs

# Command-level defaults (project-independent).
# Handlers resolve prompt names from here; workspace config no longer carries prompt_name fields.
# Map and implement have local variants selected automatically when agent.provider == "local".
commands:
  plan:
    prompt_names: project_designer
  format:
    prompt_names:
      enricher: design_doc_enricher
    # CSV column synonyms (project-independent). Workspace config commands.format.column_synonyms entries are appended (de-duped).
    column_synonyms:
      sads_id:
        - SADS ID
        - SADS_ID
        - SADSId
        - Req ID
        - Requirement ID
      sads:
        - SADS
        - Requirement
        - Spec
        - Description
      srs_id:
        - SRS ID
        - SRS_ID
        - SRSId
      srs:
        - SRS
      unit:
        - unit
        - module
        - component
        - system
      subunit:
        - subunit
        - sub-unit
        - sub_unit
        - submodule
        - sub-module
        - feature
  review:
    prompt_names: design_reviewer
  map:
    prompt_names:
      default: map_spec_to_code
      local: map_spec_to_code_local
  implement:
    # Batch briefs confidence threshold. Project config commands.implement.min_confidence_threshold overrides.
    # Items with confidence below this value block code gen until resolved. 0 = disabled.
    min_confidence_threshold: 0.7
    min_max_files: 5
    prompt_names:
      implementer:
        default: implement_from_specs
        local: implement_from_specs_local
      implementer_amend:
        default: implement_from_specs_amend
        local: implement_from_specs_local_amend
      reviewer_per_spec: reviewer_per_spec
      unified_planner: implement_unified_planner
  resolve_plan:
    prompt_names:
      map: map_issues_to_specs
      resolve: resolve_issues_with_diffs
  refine:
    prompt_names:
      # Unified single-agent quality auditor (replaces ambiguity_detector + testability_enricher).
      quality_auditor: spec_quality_auditor
      # spec_editor is invoked from the resolve flow when the operator picks "let_agent_edit".
      spec_editor: spec_editor

# Schema key -> filename mapping under schemas_dir
schema_map:
  plan_output: plan_output.schema.json
  map_output: index_output.schema.json
  implement_output: implement_output.schema.json
  resolve_plan_map_output: issue_map_output.schema.json
  resolve_plan_output: issue_resolve_output.schema.json
  handshake_output: handshake_output.schema.json
  enrich_output: design_doc_enrich_output.schema.json
  # Unified refine auditor (active).
  spec_quality_auditor_output: spec_quality_auditor_output.schema.json
  spec_quality_auditor_triage_output: spec_quality_auditor_triage_output.schema.json
  # Legacy refine schemas (retained until legacy prompt blocks are deleted).
  spec_testability_enricher_output: spec_testability_enricher_output.schema.json
  spec_testability_triage_output: spec_testability_triage_output.schema.json

# Config file candidates when --config not provided (relative to workspace root)
config_candidates:
  - config.yaml
  - config/config.yaml
  - config/config.example.yaml

# Agent provider categories: local (Loca in-process), stub (mock).
# Workspace config agent.provider selects one: local | stub.

# --- local: Loca in-process (model, timeouts, temp workspaces) ---
# Optional: ps1_path_windows (deprecated Codex CLI helpers on Windows only).
# --- local: Loca in-process (model, timeouts, temp workspaces) ---
# Optional: ps1_path_windows (deprecated Codex CLI helpers on Windows only).
local:
  # Loca sub-provider: openai | anthropic | openai-codex (see agent.provider_sub in workspace schema).
  # For openai: OPENAI_API_KEY and/or MOONSHOT_API_KEY. For anthropic: ANTHROPIC_API_KEY.
  # Optional local.model.*.base_url: OpenAI-compat root (openai) or Messages API base (anthropic).
  provider_sub: openai-codex
  # Per-agent local model settings. Keys use stable agent prompt names; local
  # prompt variants such as map_spec_to_code_local resolve through the base key.
  # Workspace overrides live under agent.default / agent.{agent_name}.
  model:
    default:
      name: gpt-5.3-codex
      # Use null to omit reasoning_effort so temperature/top_p are honored by Loca.
      reasoning_effort: medium
      # temperature: 0.7
      # top_p: 0.2
      web_search: false
      model_verbosity: null
      # base_url: "https://api.kimi.com/coding/"  # openai: OpenAI-compat root; anthropic: Messages API base
    # Refine's unified spec_quality_auditor runs Stage 1 (5 rule families + consequence + worst_case),
    # Stage 1.B (appendix gap recommendations), and Stage 2/3 (AC + criteria + test_plan) in one pass
    # for instance 0. That's a lot of structured reasoning; bumping reasoning_effort to high reduces
    # the rate of dropped enrichments observed under medium when Stage 1 produces many MR items.
    spec_quality_auditor:
      name: gpt-5.3-codex
      reasoning_effort: high
    # map_spec_to_code:
    #   name: gpt-5.3-codex
    # implement_unified_planner:
    #   name: gpt-5.3-codex
    # implement_from_specs:
    #   name: gpt-5.3-codex
    # spec_editor:
    #   name: gpt-5.4-mini
    #   # null (or YAML none / string none) omits reasoning_effort so temperature/top_p apply.
    #   reasoning_effort: null
    #   top_p: 0.1
    #   temperature: 0.8
    
  # Windows: path to codex.ps1 for deprecated Codex CLI subprocess helpers only.
  ps1_path_windows: C:\Users\night\AppData\Roaming\npm\codex.ps1
  heartbeat_interval_sec: 30
  exec_timeout_sec: 600
  temp_workspace_prefix: pika-local-agent-
  temp_workspace_ttl_sec: 86400

# --- stub: Mock agent for testing (no real invocation) ---
# Optional: plan_proposed_sads path, other artifact paths.
stub:
  plan_proposed_sads: out/agent_artifacts/plan/stub/plan_proposed_sads.csv

# Default paths relative to project root (used when workspace config omits)
default_outputs:
  log_dir: out/logs
  state_dir: out/state
  sads_id_mapping: out/state/sads_id_mapping.json
  id_registry: out/state/id_registry.json
  intermediate_map_dir: out/intermediate/map
  agent_input_codebase_content_dir: out/agent_input/codebase_content

# Defaults for workspace config (when schema allows omission)
# These match config.example.yaml; workspace overrides take precedence.
default_workspace:
  project:
    state:
      design_spec_path: out/state/DESIGN-SPEC.csv
      id_registry_path: out/state/id_registry.json
      sads_id_mapping_path: out/state/sads_id_mapping.json
  inputs:
    allowed_extensions: [.csv, .xlsx]
    project_context_filename: PROJECT_CONTEXT.md
  # Mirrors workspace keys when present (see default_outputs / id_generation in config.schema.json).
  id_generation:
    id_registry: out/state/id_registry.json
  design_spec_path: out/state/DESIGN-SPEC.csv

# ID generation patterns (project-independent).
id_generation:
  spec:
    pattern: "^[A-Za-z][0-9]+$"
  issue:
    pattern: "^[A-Za-z]{2}[0-9]+$"
  collision_scope: per_type_numeric_suffix

csv_contracts:
  design_spec:
    add_if_missing:
      - spec_id
      - module_tag
      - module_role
      - subunit
      - mapped_code_symbols
      - mapped_confidence
      - mapped_consistency_score
      - mapped_problems
      - map_status
      - map_assumptions
      - mapped_at
      - map_run_id
  issue_tracking:
    add_if_missing:
      - issue_id
      - author
      - mapped_spec_ids
      - issue_notes
      - follow_up_uncertainties
      - last_resolved_at
