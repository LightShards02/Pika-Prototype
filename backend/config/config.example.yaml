# Workspace config (project-specific). Validated against config.schema.json.
# PIKA-level defaults live in config/pika.yaml (paths, Loca/local, kimi, timeouts, etc.).
#
# Attributes that typically do NOT vary per project (have PIKA defaults):
#   - inputs.allowed_extensions (.csv, .xlsx)
#   - inputs.project_context_filename (PROJECT_CONTEXT.md)
#   - prompts.prompt_file (resolved from PIKA root)
#   - prompt_names (resolved from pika.yaml)
#   - schemas (resolved from pika.yaml schema_map)
#   - id_generation.pattern, collision_scope
#   - csv_contracts.add_if_missing (contract-defined columns)
#   - outputs.* path structure (out/, out/logs, etc.)
# Workspace config overrides PIKA defaults when specified.

version: 1

project:
  name: pika
  root_dir: .
  # control_vocab_path: vocab.yaml  # optional; per-project controlled vocabulary (categorized terms + definitions) injected into all LLM prompts. See dataset/nutrition/vocab.yaml for example.
  state:
    design_spec_path: out/state/DESIGN-SPEC.csv
    id_registry_path: out/state/id_registry.json
    sads_id_mapping_path: out/state/sads_id_mapping.json

agent:
  provider: stub  # stub | local
  schema_validation_retries: 3
  stream_output: true  # Stream output + heartbeat when agent runs (local).
  # When provider is local (Loca):
  # local_exec_timeout_sec: 1200  # Optional workspace override for long-running Loca calls
  # local_provider: openai-codex  # Loca sub-provider: openai (API key) | openai-codex (ChatGPT OAuth). Default: openai-codex.
  # Agent-specific local model settings. Keys use stable agent prompt names;
  # local prompt variants like map_spec_to_code_local resolve through the base key.
  # default:
  #   name: gpt-5.3-codex
  #   reasoning_effort: medium  # or null to omit (Loca then uses temperature/top_p)
  #   temperature: null
  #   top_p: null
  #   web_search: false
  #   model_verbosity: null
  # implement_from_specs:
  #   name: gpt-5.3-codex-spark
  #   reasoning_effort: xhigh
  # local_command is deprecated (unused by Loca); see config.schema.json.

commands:
  plan:
    enabled: false
    inputs:
      srs_path: specs/srs.md
      project_context_filename: PROJECT_CONTEXT.md
    outputs:
      root_dir: { path: out, no_overwrite: false }
      backups_dir: { path: out/backups, no_overwrite: false }
      agent_runs_dir: { path: out/agent_runs, no_overwrite: false }
      agent_artifacts_dir: { path: out/agent_artifacts, no_overwrite: false }
      logs_dir: { path: out/logs, no_overwrite: false }
  format:
    enabled: true
    deterministic: true
    copy_before_write: true
    inputs:
      design_spec_path: raw-design-spec.csv
    outputs:
      design_spec_path:
        path: out/state/DESIGN-SPEC.csv
        no_overwrite: false
      backups_dir: { path: out/backups, no_overwrite: false }
    # Optional: extend pika.yaml column synonym defaults per logical column.
    # Matching strips -, _ and whitespace then lowercases both sides.
    # column_synonyms:
    #   sads_id: [Req_ID, REQ-ID]
    #   subunit: [domain, area]
    # Optional: auto-fill module_role and acceptance_criteria via agent after normalization.
    # enrichment:
    #   enabled: false      # Set true to invoke design_doc_enricher agent
    #   skip_filled: true   # Skip rows that already have both fields populated
    # Optional: replace sensitive terms. keywords required; case_sensitive optional.
    sensitive_keywords:
      "[SOFTWARE]":
        keywords: [KGAS, SAGK]
      "[PARTNER]":
        keywords: [QX MGR]
        case_sensitive: true
  review:
    enabled: false
    inputs:
      srs_path: specs/srs.md
      design_spec_path: out/state/DESIGN-SPEC.csv
      project_context_filename: PROJECT_CONTEXT.md
    outputs:
      root_dir: { path: out, no_overwrite: false }
      backups_dir: { path: out/backups, no_overwrite: false }
      agent_runs_dir: { path: out/agent_runs, no_overwrite: false }
      agent_artifacts_dir: { path: out/agent_artifacts, no_overwrite: false }
      logs_dir: { path: out/logs, no_overwrite: false }
  map:
    enabled: true
    skip_mapped: true           # Skip map_status=mapped on re-runs
    max_acceptance_chars: 0     # Truncate acceptance_criteria at invocation (0 = unlimited)
    # max_specs_per_subunit: 50              # Split subunits larger than this into consecutive sub-batches
    # min_remapping_confidence_threshold: 0.0  # Re-map 'mapped' rows whose max confidence falls below this threshold
    # max_problem_threshold: 1.0             # Only populate problems when confidence/consistency_score < threshold
    inputs:
      design_spec_path: out/state/DESIGN-SPEC.csv
      codebase_dir: .
      project_context_filename: PROJECT_CONTEXT.md
      # extra_prompt_filename: EXTRA-PROMPT.md
    outputs:
      root_dir: { path: out, no_overwrite: false }
      backups_dir: { path: out/backups, no_overwrite: false }
      agent_runs_dir: { path: out/agent_runs, no_overwrite: false }
      agent_artifacts_dir: { path: out/agent_artifacts, no_overwrite: false }
      logs_dir: { path: out/logs, no_overwrite: false }
      agent_view_csv: { path: out/intermediate/map/agent_view.csv, no_overwrite: false }
      intermediate_map_dir: { path: out/intermediate/map, no_overwrite: false }
      # Optional: staged codebase tree/text for map agent context (see config.schema.json).
      # agent_input_codebase_content_dir: { path: out/intermediate/map/agent_codebase, no_overwrite: false }
  implement:
    enabled: true
    # Optional: cap total appendix text injected into planner/implementer prompts (0 = no limit).
    # appendix:
    #   max_appendix_chars: 500000
    inputs:
      design_spec_path: out/state/DESIGN-SPEC.csv
      codebase_dir: .
      project_context_filename: PROJECT_CONTEXT.md
      # Optional: supplementary docs (data dictionary, API notes). Paths relative to project root.
      # See config.schema.json appendix_item. CSV rows need title + content columns.
      # appendices:
      #   - path: appendices/design-notes.md
      #     format: text
      #     title: Design notes

      #   - path: appendices/appendix_rows.csv
      #     format: csv

      #     module_tag: DOMAIN
    outputs:
      root_dir: { path: out, no_overwrite: false }
      backups_dir: { path: out/backups, no_overwrite: false }
      agent_runs_dir: { path: out/agent_runs, no_overwrite: false }
      agent_artifacts_dir: { path: out/agent_artifacts, no_overwrite: false }
      logs_dir: { path: out/logs, no_overwrite: false }
      # Optional: staged codebase snapshot for implement agent inputs (see config.schema.json).
      # agent_input_codebase_content_dir: { path: out/intermediate/codebase_content, no_overwrite: false }
    # type_placement_path: workspace/shared-contracts/
    # allowed_module_roles: [frontend, api, domain, infra, shared, cli, worker]
    # unified_planner:
    #   disallowed_link_kinds_by_required_role:
    #     # Kind names must match config.schema.json enum (api_endpoint, service_interface, …).
    #     frontend: [api_endpoint, service_interface, event_topic, db_table, file_format, external_api, test_suite]
    #     domain: [external_api]
    #   leaf_dependency_roles: [infra]
    #   leaf_dependency_policy:
    #     mode: auto_drop
    #     track_external_dependencies: true
    #   contract_kind_definitions:
    #     api_endpoint:
    #       definition: Internal project API boundary between project modules.
    #     external_api:
    #       definition: Out-of-project third-party/system API boundary only.
    #   type_shape_match:
    #     min_auto_bind_score: 0.70
    #     tie_margin: 0.08
    #   min_confidence_threshold: 0.85  # Overrides pika default 0.7. Items below block until resolved. 0 = disabled.
    # workset_schema_validation: { enabled: true }
    # module_catalog_validation: { enabled: true }
    # planner_path_contract_prep: { enabled: true }
    # planner_semantic_validation:
    #   enabled: true
    #   semantic_validation_retries: 2
    # planner_manual_resolution_gate: { enabled: true }
    # spec_issue_escalation: { enabled: true }  # Escalate all spec_issues (contradiction, overlap, dependency_gap, ambiguity, orphan_reference) to blocking manual resolution items
    # unified_plan_validation: { enabled: true }
    # contract_field_consistency_validation:
    #   enabled: true
    #   field_match_score_threshold: 0.80  # Normalized similarity score (0..1)
    # required_field_coverage_validation: { enabled: true }
    # batch_plan_construction: { enabled: true }
    # batch_plan_dependency_validation: { enabled: true }
    # batch_brief_build: { enabled: true }
    # batch_brief_scope_validation: { enabled: true }
    # dependency_context_edge_validation: { enabled: true }
    # batch_runtime_path_contract_prep: { enabled: true }
    # implement_semantic_validation:
    #   enabled: true
    #   semantic_validation_retries: 2
    # implement_output_structure_validation: { enabled: true }
    # patch_constraints_validation: { enabled: true }
    # verification_command_resolution: { enabled: true }
    # patch_normalization: { enabled: true }
    # patch_apply_gate: { enabled: true }
    # contract_schema_conformance_check: { enabled: true }
    # verification_execution: { enabled: true }
    # test_spec_path: out/state/test_spec.csv
    # issue_tracker_path: out/issue_tracking.csv
    # forbidden_paths: [docs/, specs/]
    # verification_commands: [pytest -q]
    # budgets:
    #   max_specs_per_batch: 15
    #   max_files: 10
    #   max_lines_changed: 600
    #   max_context_tokens: 12000
  resolve_plan:
    enabled: true
    inputs:
      design_spec_path: out/state/DESIGN-SPEC.csv
      issue_tracking_path: out/issue_tracking.csv
    outputs:
      root_dir: { path: out, no_overwrite: false }
      backups_dir: { path: out/backups, no_overwrite: false }
      agent_runs_dir: { path: out/agent_runs, no_overwrite: false }
      agent_artifacts_dir: { path: out/agent_artifacts, no_overwrite: false }
      logs_dir: { path: out/logs, no_overwrite: false }
  refine:
    enabled: true
    decomposition:
      enabled: true
      blocking: false          # set true to gate on split/merge candidates before agents run
      similarity_threshold: 0.85
      variance_threshold: 0.15
    # Ambiguity detector + testability auditor: N parallel instances each; consensus filters by spec_id vote count.
    agent_replicas: 4
    consensus_min_votes: 3
    # Optional: same appendix knobs as implement (refine loads appendices for ambiguity/testability agents only).
    # appendix:
    #   max_appendix_chars: 500000
    inputs:
      design_spec_path: out/state/DESIGN-SPEC.csv
      project_context_filename: PROJECT_CONTEXT.md
      # appendices:
      #   - path: appendices/glossary.md
      #     format: text
      #     title: Term glossary

    outputs:
      root_dir: { path: out, no_overwrite: false }
      design_spec_path: { path: out/state/REFINED-SPEC.csv, no_overwrite: false }
      agent_runs_dir: { path: out/agent_runs, no_overwrite: false }

id_generation:
  registry_path: out/state/id_registry.json

logging:
  level: INFO
  verbose_level: DEBUG
  json: true
  log_dir: out/logs
