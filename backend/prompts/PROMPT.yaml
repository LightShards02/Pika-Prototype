      {{allowed_paths_json}}

      Forbidden Path Prefixes (JSON):
      {{forbidden_path_patterns_json}}

      Codebase Dir:
      {{codebase_dir}}

      Batch Brief:
      {{batch_brief_json}}

      Selected Specs (CSV):
      {{selected_specs_csv}}

      Acceptance Criteria (per-spec, JSON):
      {{acceptance_criteria_json}}

      Test Plan (per-spec, JSON):
      {{test_plan_json}}

      Amendment Packet (JSON):
      {{amendment_packet_json}}

      Prior Diff Plan (JSON):
      {{prior_diff_plan_json}}

      Prior Authored Tests (JSON):
      {{prior_authored_tests_json}}

      Iteration Index: {{iteration_index}}

