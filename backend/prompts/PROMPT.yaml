  spec_testability_auditor:
    description: Scan SADS acceptance_criteria fields for criteria that cannot be directly automated as tests and emit manual_resolution_items.
    output_schema_file: schemas/agent_outputs/spec_testability_auditor_output.schema.json
    template_variables:
      - name: output_schema_file
        required: true
