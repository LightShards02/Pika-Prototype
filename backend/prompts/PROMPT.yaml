  spec_ambiguity_detector:
    description: Scan SADS spec requirement fields for vague language and emit manual_resolution_items.
    output_schema_file: schemas/agent_outputs/spec_ambiguity_detector_output.schema.json
    template_variables:
      - name: output_schema_file
        required: true
        description: Schema file path that this prompt output must validate against.
      - name: project_context
        required: true
        description: Content of project context file (e.g. PROJECT_CONTEXT.md).
      - name: design_spec_csv
