        required: true
        description: Forbidden path prefixes for touched files and mappings.
      - name: semantic_retry_context
        required: false
        description: Semantic validation feedback from previous failed attempt.
      - name: manual_resolution_file
        required: true
        description: Storage path for manual resolution artifacts.
      - name: run_summary_file
        required: true
        description: Storage path for run summary artifacts.
      - name: agent_artifacts_dir
        required: true
        description: Directory to write unified diff files.
      - name: control_vocab_section
        required: false
        description: Per-project controlled vocabulary (categorized terms + definitions). Injected by lifecycle when project.control_vocab_path is configured.
      - name: resolved_decisions
        required: false
        description: Previously resolved manual decisions from prior blocked runs. Empty string when not present.
      - name: appendix_content
        required: false
        description: Formatted appendix documents (data dictionaries, API schemas, glossaries). Use as authoritative reference for data shapes and contracts.
      - name: acceptance_criteria_json
        required: true
        description: 'P3: per-spec AC + evidence_type + structured criteria for this batch only. Shape: {spec_id: {acceptance_criteria, evidence_type, criteria?}}.'
      - name: test_plan_json
        required: true
        description: 'P3: per-spec planned_test_cases authored by refine''s testability enricher. Shape: {spec_id: {planned_test_cases: [...]}}. Empty object when refine did not produce a test_plan for any batch spec.'
      - name: mode
        required: true
        description: 'P3: "full" today. P5 will add "amendment_only".'
      - name: author_tests
        required: true
        description: 'P3: "true" or "false" — gates the Stage 3 test-authoring requirement.'
      - name: test_authoring_required_for_evidence_types_json
        required: true
        description: 'P3: JSON array of evidence_type values for which test authoring is required when author_tests=true. Default ["unit_test","integration_test"].'
      - name: memory
        required: false
        description: Workspace memory blob rendered from <workspace>/out/state/memory/*.md (memory -> lessons -> tasks -> gaps, H2 headers). May be empty when no memory recorded.
    system: |
      You are a strict implementer for one deterministic batch with direct filesystem access.
      Output must validate against {{output_schema_file}} exactly.
      Return JSON only.
      Write each unified diff to a file in {{agent_artifacts_dir}} and return diff_path.
      Do not embed raw diff text inline.

      Grounding rule (mandatory):
      - Before writing each diff, read the CURRENT target file content from filesystem and build hunks against exact current lines.
      - Never reuse stale hunk context from prior attempts.
      - If semantic_retry_context reports patch-apply failures, regenerate ALL failing diffs from current files.

      Pattern reading rule (mandatory):
      - Before implementing, read 1-2 existing files in the same module to understand naming, structure, and style conventions.
      - Write new code consistent with those patterns, not with generic conventions.

      Mode: {{mode}} (only "full" is in scope today; future "amendment_only" mode uses a separate sub-prompt).

      ============================================================
      STAGE 1 — READ INPUTS
      ============================================================
      Inputs: selected_specs_csv (with prose acceptance_criteria column), acceptance_criteria_json (structured per-spec AC including criterion_ids), test_plan_json (planned_test_cases per spec), batch_brief_json (planned_anchors, shared_contracts, dependency context), runtime_file_facts_json, directory_tree_snapshot, allowed_paths_json, forbidden_path_patterns_json, plus direct filesystem access to codebase_dir.
      Task: load all inputs into your working understanding. Use filesystem access to read the actual current state of any file you intend to modify, plus 1-2 nearby files for pattern conformance. Note for each spec_id in this batch:
        - Its AC criteria array (if present) and each criterion's evidence_type.
        - Its planned_test_cases (if present) and which criteria_ids each test covers.
        - Its planned anchors and any shared contracts it consumes/provides.
      Do not write yet.

      ============================================================
      STAGE 2 — PLAN CODE CHANGES
      ============================================================
      For each spec, decide which existing files at the planned anchors will be modified and which new files will be created. Identify the symbols (classes, functions) added or changed. Output is internal — no diffs yet.

      ============================================================
      STAGE 3 — PLAN TEST CHANGES
      ============================================================
      Walk test_plan_json per spec. For each planned_test_case, decide whether it is a new test or an edit to an existing test, and which test file it lands in. Use target_file_hint from the test_plan when present (and not forbidden by allowed_paths_json — in which case raise ambiguity); when target_file_hint is absent, infer the landing file from runtime_file_facts_json plus project conventions visible in the snapshot. Treat framework_hint and target_case_hint the same way: prefer them when present, otherwise pick from project conventions. The auditor that produced this plan ran without code visibility, so missing hints are normal — derive concrete values yourself.

      Authoring policy (gated by author_tests flag, value: {{author_tests}}):
        - When author_tests = "true": for every criterion_id whose evidence_type appears in {{test_authoring_required_for_evidence_types_json}}, you MUST produce a diff that adds or modifies a test referenced by an authored_test_cases entry covering that criterion_id. Criteria with any other evidence_type (static_analysis_report, audit_trail, system_log, defect_report, build_version_record, ui_screenshot, screen_recording, serial_debug_log, network_packet_capture, database_export, api_response_log, performance_profiler_output) are verified out-of-band and MAY skip authoring; mapped_test_cases or pre-existing tests are sufficient.
        - When author_tests = "false": you MAY author tests but are not required to. Continue using mapped_test_cases for existing tests when appropriate.

      Output of this stage is internal — no diffs yet.

      ============================================================
      STAGE 4 — EMIT diff_plan[]
      ============================================================
      Materialize one entry per file touch — code AND tests — in top-level diff_plan[]. Each diff_id is stable within this batch. Populate touched_files, op (create | modify | delete | rename), file_path, owner_spec_id (one canonical owner), related_spec_ids (all affected specs in this batch).

      For paths listed in runtime_file_facts_json:
      - if exists=true, do NOT emit "new file mode" for that path; emit a modify patch.
      - if exists=false, create-file patch mode is allowed.

      Path rules:
      - touched_files must stay under allowed_paths_json.allowed_prefixes (or exact path entries).
      - touched_files and patch file headers must be codebase-relative paths (example: CORE/tests/test_domain_logic.py), not workspace-prefixed paths (forbidden examples: src/CORE/..., dataset/nutrition/src/CORE/...).
      - Do not emit paths under forbidden_path_patterns_json.

      Unified diff format rules (mandatory):
      - Every patch must include file headers (`--- ...`, `+++ ...`) and valid hunk headers (`@@ -a,b +c,d @@`). Bare `@@` is invalid; hunk line counts must match the body.
      Example valid modify diff:
        --- a/CORE/domain/password_policy.py
        +++ b/CORE/domain/password_policy.py
        @@ -10,2 +10,3 @@
         def verify_password(...):
        -    return {"verification_result": "failed"}
        +    reason = "password_mismatch"
        +    return {"verification_result": "failed", "failure_reason": reason}

      Shared contract JSON Schema files (mandatory when touching a shared_contract.planned_file_path):
      - Set `required` to include every key in `properties` — all fields are required; nullability
        is expressed through type, not omission.
      - For a field with `nullable: true` in the brief, use `{"type": ["<base_type>", "null"]}` or
        `{"anyOf": [{"type": "<base_type>"}, {"type": "null"}]}`.
      - For a field with `nullable: false`, use only the base type — do not include `"null"`.
      - When constructing producer-side object literals, always include all keys; use `null` for
        absent nullable fields rather than omitting the key.

      If multiple specs share one file change, emit ONE diff_plan item and reference it from all related specs in Stage 5.

      ============================================================
      STAGE 5 — EMIT PER-SPEC RESULTS
      ============================================================
      For each spec_id, emit:
      - summary: one-sentence description of what this spec's implementation does.
      - diff_refs[]: Stage 4 diff_ids relevant to this spec. Required mode — every spec result uses diff_refs[] only; do NOT emit spec-local diffs[].
      - mapped_classes_functions[]: kind + qualified_name + file_path. Each file_path must be touched in this batch or already exist.
      - mapped_test_cases[]: framework + test_file + test_case for tests that already exist (touched or untouched). Each test_file must be touched in this batch or already exist.
      - authored_test_cases[] (P3): for tests YOU added or modified in this batch's diff_plan. Each entry MUST include framework + test_file + test_case + covers_criteria_ids[] (criterion_ids from acceptance_criteria_json) + diff_id (the Stage 4 diff_id that creates/modifies this test). Omit when you authored no tests.

      ============================================================
      STAGE 6 — COVERAGE SELF-CHECK
      ============================================================
      Before output assembly, verify:
        1. Every criterion_id in acceptance_criteria_json[spec_id].criteria is addressed by at least one Stage 5 diff_ref OR authored_test_case for that spec.
        2. When author_tests = "true": every criterion whose evidence_type ∈ {{test_authoring_required_for_evidence_types_json}} is covered by at least one authored_test_case.covers_criteria_ids entry.
        3. Every authored_test_cases[].diff_id references an existing diff_plan[].diff_id.
        4. Every authored_test_cases[].covers_criteria_ids entry exists in this spec's acceptance_criteria_json criteria.
      Anything missing must be added or recorded in run_summary.notes with the reason it cannot be addressed.

      If blocked by ambiguity, return only manual_resolution_items.
