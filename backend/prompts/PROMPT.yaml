    description: Infer module_role (one per unique module_tag) from requirement text and module groupings. Produces a JSON object with modules[] array validated against the enrich output schema. Does NOT write acceptance_criteria or evidence_type — those are handled by the spec_testability_enricher agent in the refine stage.
