  spec_ambiguity_detector:
    description: Scan SADS spec requirement fields for vague language and emit manual_resolution_items.
    output_schema_file: schemas/agent_outputs/spec_ambiguity_detector_output.schema.json
    template_variables:
      - name: output_schema_file
        required: true
        description: Schema file path that this prompt output must validate against.
      - name: project_context
        required: true
        description: Content of project context file (e.g. PROJECT_CONTEXT.md).
      - name: design_spec_csv
        required: true
        description: Full SADS design spec as CSV text (all columns).
      - name: manual_resolution_file
        required: true
        description: Storage path for manual resolution artifacts.
      - name: run_summary_file
        required: true
        description: Storage path for run summary artifacts.
      - name: control_vocab_section
        required: false
        description: Per-project controlled vocabulary. Injected by lifecycle when configured.
    system: |
      You are a strict spec ambiguity detector.
      Your output JSON must validate against {{output_schema_file}} without exception.
      Return JSON only. Do not include markdown fences.
      Scan every row's requirement field for vague or unmeasurable language. Do NOT scan acceptance_criteria; testability of that field is handled by the testability auditor.
      Cross-spec references: If a requirement references another spec by explicit ID (e.g. "as defined in A1001", "see A2003") or by relative position (e.g. "as specified above", "the row below"), resolve the reference against the CSV. For explicit IDs, look up the spec_id directly. For relative references like "above" or "below", use the adjacent rows in CSV order. If the resolved row exists and its requirement is concrete and measurable, do NOT flag the reference as vague. Only flag a cross-spec reference when the target row cannot be resolved or its requirement is itself vague.
      For each issue found, emit one manual_resolution_item with:
        - item_id: unique identifier (e.g. AMB-001)
        - spec_id: the affected spec row
        - field: always "requirement"
        - vague_phrases: exact phrases that are vague
        - suggested_improvement: complete rewrite of the field with specific, measurable language
        - options: exactly three options — accept_suggestion, let_agent_edit, skip
      An empty manual_resolution_items array means no ambiguities were found (non-blocking).
    user: |
      Project Context:
      {{project_context}}
      {{control_vocab_section}}

      Design Spec (CSV):
      {{design_spec_csv}}

      Manual Resolution File:
      {{manual_resolution_file}}

      Run Summary File:
      {{run_summary_file}}

  spec_testability_auditor:
    description: Scan SADS acceptance_criteria fields for criteria that cannot be directly automated as tests and emit manual_resolution_items.
    output_schema_file: schemas/agent_outputs/spec_testability_auditor_output.schema.json
    template_variables:
      - name: output_schema_file
        required: true
        description: Schema file path that this prompt output must validate against.
      - name: project_context
        required: true
        description: Content of project context file (e.g. PROJECT_CONTEXT.md).
      - name: design_spec_csv
        required: true
        description: Full SADS design spec as CSV text (all columns).
      - name: manual_resolution_file
        required: true
        description: Storage path for manual resolution artifacts.
      - name: run_summary_file
        required: true
        description: Storage path for run summary artifacts.
      - name: control_vocab_section
        required: false
        description: Per-project controlled vocabulary. Injected by lifecycle when configured.
    system: |
      You are a strict spec testability auditor.
      Your output JSON must validate against {{output_schema_file}} without exception.
      Return JSON only. Do not include markdown fences.
      Scan every row's acceptance_criteria for criteria that cannot be directly automated as tests.
      For each untestable criterion, emit one manual_resolution_item with:
        - item_id: unique identifier (e.g. TEST-001)
        - spec_id: the affected spec row
        - field: always "acceptance_criteria"
        - untestable_reason: why the criterion cannot be automated
        - suggested_improvement: rewrite in automatable form
        - suggested_test_type: unit | integration | e2e | manual
        - options: exactly three options — accept_suggestion, let_agent_edit, skip
      An empty manual_resolution_items array means all criteria are testable (non-blocking).
    user: |
      Project Context:
      {{project_context}}
      {{control_vocab_section}}

      Design Spec (CSV):
      {{design_spec_csv}}

      Manual Resolution File:
      {{manual_resolution_file}}

      Run Summary File:
      {{run_summary_file}}

  spec_editor:
    description: Produce a field-level or structural edit for a single spec issue identified during refine.
    output_schema_file: schemas/agent_outputs/spec_editor_output.schema.json
    template_variables:
      - name: output_schema_file
        required: true
        description: Schema file path that this prompt output must validate against.
      - name: project_context
        required: true
        description: Content of project context file (e.g. PROJECT_CONTEXT.md).
      - name: issue_kind
        required: true
        description: '"field" for ambiguity/testability items; "structural" for decomposition items.'
      - name: spec_id
        required: true
        description: spec_id of the primary spec row being edited.
      - name: field
        required: false
        description: Field name to rewrite (field mode only — "requirement" or "acceptance_criteria").
      - name: affected_spec_ids
        required: false
        description: Comma-separated spec_ids involved (structural mode — split/merge candidates).
      - name: current_text
        required: true
        description: Current text of the field being edited (field mode) or empty string (structural mode).
      - name: issue_description
        required: true
        description: Description of the quality issue to address.
      - name: suggested_improvement
        required: false
        description: Agent-suggested improvement from the detector (may be empty for structural mode).
      - name: full_spec_csv
        required: true
        description: Full SADS design spec as CSV text for context.
    system: |
      You are a strict spec editor. Produce ONE edit only.
      Your output JSON must validate against {{output_schema_file}} without exception.
      Return JSON only. Do not include markdown fences.
      Issue kind: {{issue_kind}}
      - If issue_kind is "field": produce a field-level edit with edit_type="field".
        Set field to the exact column name, new_text to the complete replacement text, rationale to why it improves the spec.
      - If issue_kind is "structural": produce a structural edit with edit_type="structural".
        Use add/update/delete actions on spec rows. row_data must include all required SADS columns.
        rationale must explain why the split or merge is correct.
      Do not include both field and structural keys. Use the oneOf branch that matches issue_kind.
    user: |
      Project Context:
      {{project_context}}

      Issue Kind: {{issue_kind}}
      Spec ID: {{spec_id}}
      Field: {{field}}
      Affected Spec IDs: {{affected_spec_ids}}

      Current Text:
      {{current_text}}

      Issue Description:
      {{issue_description}}

      Suggested Improvement:
      {{suggested_improvement}}

      Full Design Spec (CSV):
      {{full_spec_csv}}

